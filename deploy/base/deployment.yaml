apiVersion: v1
kind: ServiceAccount
metadata:
  name: subscription
  namespace: mindlet
  labels:
    app.kubernetes.io/name: subscription
    app.kubernetes.io/part-of: mindlet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription
  namespace: mindlet
  labels:
    app.kubernetes.io/name: subscription
    app.kubernetes.io/part-of: mindlet
    mindlet.io/network-policy: default-deny-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: subscription
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subscription
        app.kubernetes.io/part-of: mindlet
        mindlet.io/network-policy: default-deny-ingress
    spec:
      serviceAccountName: subscription
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: mindlet-subscription:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: platform-config
            - configMapRef:
                name: subscription-config
            - secretRef:
                name: subscription-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10

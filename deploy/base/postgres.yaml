apiVersion: v1
kind: Secret
metadata:
  name: subscription-postgres-credentials
  namespace: mindlet
  labels:
    mindlet.io/workload: subscription
    app.kubernetes.io/part-of: mindlet
type: Opaque
stringData:
  POSTGRES_USER: mindlet
  POSTGRES_PASSWORD: mindlet
  POSTGRES_DB: mindlet_subscription
---
apiVersion: v1
kind: Service
metadata:
  name: subscription-postgres
  namespace: mindlet
  labels:
    mindlet.io/workload: subscription
    app.kubernetes.io/part-of: mindlet
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/component: postgres
    mindlet.io/workload: subscription
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: subscription-postgres
  namespace: mindlet
  labels:
    mindlet.io/workload: subscription
    app.kubernetes.io/part-of: mindlet
spec:
  serviceName: subscription-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      mindlet.io/workload: subscription
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        mindlet.io/workload: subscription
        app.kubernetes.io/part-of: mindlet
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: subscription-postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: subscription
  namespace: mindlet
  labels:
    app.kubernetes.io/name: subscription
    app.kubernetes.io/part-of: mindlet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: subscription
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
